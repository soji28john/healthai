<svg width="100%" viewBox="0 0 680 700" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>HealthAI — clean architecture on free-tier stack</title>
  <desc>Five-layer architecture diagram: client, API gateway, agent core, data, and free-tier deployment targets for each layer.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .layer-label { font-size: 12px; fill: #888780; }

      .teal-box { fill: #E1F5EE; stroke: #0F6E56; }
      .teal-text { fill: #085041; }
      .teal-sub  { fill: #0F6E56; }

      .purple-box { fill: #EEEDFE; stroke: #534AB7; }
      .purple-text { fill: #3C3489; }
      .purple-sub  { fill: #534AB7; }

      .coral-box { fill: #FAECE7; stroke: #993C1D; }
      .coral-text { fill: #712B13; }
      .coral-sub  { fill: #993C1D; }

      .amber-box { fill: #FAEEDA; stroke: #854F0B; }
      .amber-text { fill: #633806; }
      .amber-sub  { fill: #854F0B; }

      .green-box { fill: #EAF3DE; stroke: #3B6D11; }
      .green-text { fill: #27500A; }
      .green-sub  { fill: #3B6D11; }

      .gray-box { fill: #F1EFE8; stroke: #5F5E5A; }
      .gray-text { fill: #444441; }
      .gray-sub  { fill: #5F5E5A; }

      .layer-border { fill: none; stroke: #D3D1C7; stroke-width: 0.5; stroke-dasharray: 5 3; }
      .deploy-border { fill: none; stroke: #3B6D11; stroke-width: 0.5; stroke-dasharray: 5 3; }
      .connector { stroke: #888780; stroke-width: 1; fill: none; }
    </style>
  </defs>

  <!-- Layer labels -->
  <text class="layer-label" x="38" y="82"  text-anchor="end">Client</text>
  <text class="layer-label" x="38" y="192" text-anchor="end">Gateway</text>
  <text class="layer-label" x="38" y="340" text-anchor="end">Agents</text>
  <text class="layer-label" x="38" y="510" text-anchor="end">Data</text>
  <text class="layer-label" x="38" y="620" text-anchor="end">Deploy</text>

  <!-- ── Layer 1: Client ── -->
  <rect x="42" y="52" width="596" height="60" rx="10" class="layer-border"/>
  <rect x="58"  y="62" width="160" height="40" rx="6" stroke-width="0.5" class="teal-box"/>
  <text class="th teal-text" x="138" y="78"  text-anchor="middle" dominant-baseline="central">React (Vite)</text>
  <text class="ts teal-sub"  x="138" y="94"  text-anchor="middle" dominant-baseline="central">Web UI</text>

  <rect x="238" y="62" width="160" height="40" rx="6" stroke-width="0.5" class="teal-box"/>
  <text class="th teal-text" x="318" y="78"  text-anchor="middle" dominant-baseline="central">PWA / mobile</text>
  <text class="ts teal-sub"  x="318" y="94"  text-anchor="middle" dominant-baseline="central">React Native Web</text>

  <rect x="418" y="62" width="200" height="40" rx="6" stroke-width="0.5" class="teal-box"/>
  <text class="th teal-text" x="518" y="78"  text-anchor="middle" dominant-baseline="central">Voice (Web Speech API)</text>
  <text class="ts teal-sub"  x="518" y="94"  text-anchor="middle" dominant-baseline="central">Browser-native, free</text>

  <!-- Arrow -->
  <line x1="340" y1="112" x2="340" y2="142" class="connector" marker-end="url(#arrow)"/>

  <!-- ── Layer 2: API Gateway ── -->
  <rect x="42" y="148" width="596" height="70" rx="10" class="layer-border"/>
  <rect x="80"  y="160" width="220" height="46" rx="6" stroke-width="0.5" class="purple-box"/>
  <text class="th purple-text" x="190" y="177" text-anchor="middle" dominant-baseline="central">FastAPI gateway</text>
  <text class="ts purple-sub"  x="190" y="194" text-anchor="middle" dominant-baseline="central">Auth · rate limit · logging</text>

  <rect x="330" y="160" width="280" height="46" rx="6" stroke-width="0.5" class="purple-box"/>
  <text class="th purple-text" x="470" y="177" text-anchor="middle" dominant-baseline="central">Policy agent middleware</text>
  <text class="ts purple-sub"  x="470" y="194" text-anchor="middle" dominant-baseline="central">Block · escalate · allow · audit log</text>

  <!-- Arrow -->
  <line x1="340" y1="218" x2="340" y2="248" class="connector" marker-end="url(#arrow)"/>

  <!-- ── Layer 3: Agent Core ── -->
  <rect x="42" y="254" width="596" height="200" rx="10" class="layer-border"/>

  <!-- Orchestrator -->
  <rect x="58" y="264" width="562" height="40" rx="6" stroke-width="0.5" class="purple-box"/>
  <text class="th purple-text" x="339" y="280" text-anchor="middle" dominant-baseline="central">LangGraph orchestrator</text>
  <text class="ts purple-sub"  x="339" y="296" text-anchor="middle" dominant-baseline="central">Stateful graph · session memory · agent router</text>

  <!-- Agent row -->
  <rect x="58"  y="318" width="100" height="40" rx="6" stroke-width="0.5" class="coral-box"/>
  <text class="th coral-text" x="108" y="334" text-anchor="middle" dominant-baseline="central">Symptom</text>
  <text class="ts coral-sub"  x="108" y="350" text-anchor="middle" dominant-baseline="central">NLP triage</text>

  <rect x="170" y="318" width="100" height="40" rx="6" stroke-width="0.5" class="coral-box"/>
  <text class="th coral-text" x="220" y="334" text-anchor="middle" dominant-baseline="central">Nutrition</text>
  <text class="ts coral-sub"  x="220" y="350" text-anchor="middle" dominant-baseline="central">RDA gaps</text>

  <rect x="282" y="318" width="100" height="40" rx="6" stroke-width="0.5" class="coral-box"/>
  <text class="th coral-text" x="332" y="334" text-anchor="middle" dominant-baseline="central">Wellness</text>
  <text class="ts coral-sub"  x="332" y="350" text-anchor="middle" dominant-baseline="central">Remedies · yoga</text>

  <rect x="394" y="318" width="110" height="40" rx="6" stroke-width="0.5" class="coral-box"/>
  <text class="th coral-text" x="449" y="334" text-anchor="middle" dominant-baseline="central">Mental health</text>
  <text class="ts coral-sub"  x="449" y="350" text-anchor="middle" dominant-baseline="central">CBT · PHQ-9</text>

  <rect x="516" y="318" width="104" height="40" rx="6" stroke-width="0.5" class="coral-box"/>
  <text class="th coral-text" x="568" y="334" text-anchor="middle" dominant-baseline="central">ML predictor</text>
  <text class="ts coral-sub"  x="568" y="350" text-anchor="middle" dominant-baseline="central">Risk + timeline</text>

  <!-- RAG + LLM row -->
  <rect x="58"  y="374" width="270" height="40" rx="6" stroke-width="0.5" class="amber-box"/>
  <text class="th amber-text" x="193" y="390" text-anchor="middle" dominant-baseline="central">RAG pipeline</text>
  <text class="ts amber-sub"  x="193" y="406" text-anchor="middle" dominant-baseline="central">LlamaIndex · ChromaDB · sentence-transformers</text>

  <rect x="350" y="374" width="270" height="40" rx="6" stroke-width="0.5" class="amber-box"/>
  <text class="th amber-text" x="485" y="390" text-anchor="middle" dominant-baseline="central">LLM router</text>
  <text class="ts amber-sub"  x="485" y="406" text-anchor="middle" dominant-baseline="central">Gemini Flash · Groq · Ollama fallback</text>

  <!-- Arrow -->
  <line x1="340" y1="454" x2="340" y2="480" class="connector" marker-end="url(#arrow)"/>

  <!-- ── Layer 4: Data ── -->
  <rect x="42" y="486" width="596" height="76" rx="10" class="layer-border"/>

  <rect x="58"  y="496" width="160" height="56" rx="6" stroke-width="0.5" class="green-box"/>
  <text class="th green-text" x="138" y="516" text-anchor="middle" dominant-baseline="central">SQLite</text>
  <text class="ts green-sub"  x="138" y="534" text-anchor="middle" dominant-baseline="central">User · session</text>
  <text class="ts green-sub"  x="138" y="548" text-anchor="middle" dominant-baseline="central">health profiles</text>

  <rect x="238" y="496" width="160" height="56" rx="6" stroke-width="0.5" class="green-box"/>
  <text class="th green-text" x="318" y="516" text-anchor="middle" dominant-baseline="central">ChromaDB</text>
  <text class="ts green-sub"  x="318" y="534" text-anchor="middle" dominant-baseline="central">Symptom vectors</text>
  <text class="ts green-sub"  x="318" y="548" text-anchor="middle" dominant-baseline="central">medical KB</text>

  <rect x="418" y="496" width="200" height="56" rx="6" stroke-width="0.5" class="green-box"/>
  <text class="th green-text" x="518" y="516" text-anchor="middle" dominant-baseline="central">Model store</text>
  <text class="ts green-sub"  x="518" y="534" text-anchor="middle" dominant-baseline="central">scikit-learn · XGBoost</text>
  <text class="ts green-sub"  x="518" y="548" text-anchor="middle" dominant-baseline="central">joblib files</text>

  <!-- Arrow -->
  <line x1="340" y1="562" x2="340" y2="586" class="connector" marker-end="url(#arrow)"/>

  <!-- ── Layer 5: Deployment ── -->
  <rect x="42" y="592" width="596" height="54" rx="10" class="deploy-border"/>

  <rect x="58"  y="602" width="130" height="34" rx="6" stroke-width="0.5" class="gray-box"/>
  <text class="th gray-text" x="123" y="614" text-anchor="middle" dominant-baseline="central">Vercel</text>
  <text class="ts gray-sub"  x="123" y="628" text-anchor="middle" dominant-baseline="central">Frontend · free</text>

  <rect x="204" y="602" width="130" height="34" rx="6" stroke-width="0.5" class="gray-box"/>
  <text class="th gray-text" x="269" y="614" text-anchor="middle" dominant-baseline="central">Render</text>
  <text class="ts gray-sub"  x="269" y="628" text-anchor="middle" dominant-baseline="central">FastAPI backend</text>

  <rect x="350" y="602" width="160" height="34" rx="6" stroke-width="0.5" class="gray-box"/>
  <text class="th gray-text" x="430" y="614" text-anchor="middle" dominant-baseline="central">HF Spaces</text>
  <text class="ts gray-sub"  x="430" y="628" text-anchor="middle" dominant-baseline="central">ML demo · Gradio</text>

  <rect x="526" y="602" width="102" height="34" rx="6" stroke-width="0.5" class="gray-box"/>
  <text class="th gray-text" x="577" y="614" text-anchor="middle" dominant-baseline="central">Railway</text>
  <text class="ts gray-sub"  x="577" y="628" text-anchor="middle" dominant-baseline="central">DB · free tier</text>
</svg>
